name: Deploy to S3 (dev)

on:
  push:
    branches: [ develop ]   # runs when you push/merge to 'develop'

permissions:
  id-token: write           # needed for OIDC (AuthN)
  contents: read            # read the repo to build

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev        # uses the GitHub Environment you created
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
